name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'site-docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs dependencies
        run: pip install -r docs-requirements.txt

      - name: Build MkDocs into docs/ subfolder
        run: mkdocs build -d _build/docs

      - name: Assemble final site
        run: |
          cp site-docs/index.html _build/index.html
          cp -r site-docs/assets _build/assets 2>/dev/null || true
          cp site-docs/og-image.svg _build/og-image.svg 2>/dev/null || true
          cp site-docs/robots.txt _build/robots.txt 2>/dev/null || true
          cp site-docs/sitemap.xml _build/sitemap.xml 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _build --project-name=alma-memory
