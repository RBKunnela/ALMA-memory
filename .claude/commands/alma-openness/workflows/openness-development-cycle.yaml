name: openness-development-cycle
description: >
  Build the universal access layer for ALMA Open Brain.
  Transforms ALMA into a personal brain backend that works across
  every AI tool with zero switching cost.
version: "1.0.0"
squad: alma-openness

# Development flow:
#   Step 1 is foundational (no dependencies).
#   Steps 2, 3, 4 can run in parallel after step 1 completes.
#
#   [1. Schema] ──┬── [2. Quickstart CLI]
#                 ├── [3. Multi-Client Protocol]
#                 └── [4. Memory Migration]

steps:
  - id: design-personal-brain-schema
    name: "Design Personal Brain Schema"
    agent: domain-designer
    task: tasks/design-personal-brain-schema.md
    requires: []
    description: >
      Design and implement the Personal Brain domain schema for ALMA.
      This creates the 7th pre-built domain with 6 entity types
      (thought, insight, decision, person, project, lesson) and
      6 relationship types.
    output:
      - alma/domains/personal_brain.py
      - alma/domains/factory.py (updated)
      - alma/domains/__init__.py (updated)
      - tests/unit/test_personal_brain.py
    gate:
      - "All 6 entity types defined with correct attributes"
      - "All 6 relationship types defined with valid source/target"
      - "8 learning categories covering personal knowledge patterns"
      - "Schema follows DomainSchema factory pattern from alma/domains/schemas.py"
      - "Schema registered in DomainMemoryFactory._builtin_schemas"
      - "schema.validate() returns empty list"
      - "All unit tests pass"
      - "Linting passes (ruff check)"
    estimated_hours: 4

  - id: build-quickstart-cli
    name: "Build Quickstart CLI"
    agent: quickstart-dev
    task: tasks/build-quickstart-cli.md
    requires:
      - design-personal-brain-schema
    description: >
      Build the alma init --open-brain CLI command that generates
      ALMA config, SQL migrations, and MCP configuration.
      Target: zero to working personal brain in 45 minutes.
    output:
      - alma/cli/init.py
      - alma/cli/__init__.py
      - alma/cli/templates/config.yaml
      - alma/cli/templates/migration.sql
      - alma/cli/templates/mcp.json
      - tests/unit/test_cli_init.py
    gate:
      - "Interactive and non-interactive modes both work"
      - "Generated .alma/config.yaml loadable by ConfigLoader"
      - "Generated migration.sql is valid idempotent PostgreSQL"
      - "Generated .mcp.json has correct alma-memory server config"
      - "Config uses ${ENV_VAR} for all secrets"
      - "Domain 'personal_brain' referenced correctly"
      - "End-to-end test: init -> capture -> retrieve passes"
      - "All unit tests pass"
      - "Linting passes (ruff check)"
    estimated_hours: 8

  - id: implement-multi-client-protocol
    name: "Implement Multi-Client Protocol"
    agent: protocol-architect
    task: tasks/implement-multi-client-protocol.md
    requires:
      - design-personal-brain-schema
    description: >
      Handle concurrent MCP connections from multiple AI tools.
      Implement source_tool tracking, cross-tool deduplication,
      and backend-specific concurrent write safety.
    output:
      - alma/mcp/multi_client.py
      - alma/mcp/conflict.py
      - alma/mcp/server.py (updated)
      - tests/unit/test_multi_client.py
    gate:
      - "MultiClientManager class implemented"
      - "source_tool tracked in memory metadata for every write"
      - "Cross-tool dedup prevents duplicates within time window"
      - "Concurrent writes from 2+ clients handled safely"
      - "Concurrency strategy auto-detected from storage backend"
      - "QueuedConcurrency for SQLite/file-based backends"
      - "DatabaseConcurrency for PostgreSQL/Cosmos backends"
      - "Integration with ALMAMCPServer"
      - "All unit tests pass"
      - "Linting passes (ruff check)"
    estimated_hours: 8

  - id: build-memory-migration
    name: "Build Memory Migration Tools"
    agent: domain-designer
    task: tasks/build-memory-migration.md
    requires:
      - design-personal-brain-schema
    description: >
      Build importers for Claude memory export, ChatGPT memory export,
      and Obsidian vaults. Preserve >90% of source metadata.
    output:
      - alma/migration/__init__.py
      - alma/migration/base.py
      - alma/migration/types.py
      - alma/migration/claude_importer.py
      - alma/migration/chatgpt_importer.py
      - alma/migration/obsidian_importer.py
      - tests/unit/test_migration.py
    gate:
      - "BaseImporter ABC with parse/map/run_import methods"
      - "Claude importer parses JSON and maps to Personal Brain entities"
      - "ChatGPT importer parses JSON and maps to Personal Brain entities"
      - "Obsidian importer handles markdown, frontmatter, and wiki links"
      - "Content classification assigns correct entity types"
      - "source_tool tracked on every imported memory"
      - "Metadata preservation >90%"
      - "Dry-run mode works without storing"
      - "Import is idempotent"
      - "All unit tests pass"
      - "Linting passes (ruff check)"
    estimated_hours: 10

# Parallelization strategy:
# After step 1 completes, steps 2/3/4 can be assigned to different
# agents and worked on simultaneously. The only shared dependency
# is the Personal Brain schema from step 1.
parallelization:
  after: design-personal-brain-schema
  parallel_steps:
    - build-quickstart-cli
    - implement-multi-client-protocol
    - build-memory-migration

# Quality criteria applied across all steps
quality:
  code_standards:
    - "Python 3.10+ compatible"
    - "ruff formatted (line-length 88)"
    - "Google-style docstrings"
    - "Type hints on public API"
  testing:
    - "Unit tests with alma.testing.MockStorage and MockEmbedder"
    - "pytest-asyncio for async tests"
    - "Coverage target: 80% for new modules"
  integration:
    - "All new code follows alma/ package conventions"
    - "No new external dependencies without justification"
    - "No database infrastructure added (ALMA is a library)"

# Total estimated effort
totals:
  estimated_hours: 30
  agents_required: 3
  critical_path: "design-personal-brain-schema -> any of [quickstart-cli, multi-client, migration]"
  expected_duration_days: "3-5 (with parallel execution)"
